name: release
run-name: release ${{ github.ref_name || inputs.tag }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to dispatch.
        required: true
        type: string
      sha:
        description: Optional commit SHA that the release tag must point to.
        required: false
        type: string

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-slim
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch publish
        uses: lwmacct/260707-action-workflow-dispatch@main
        with:
          workflow: publish.yml
          source-tag: ${{ github.ref_name || inputs.tag }}
          source-sha: ${{ inputs.sha }}
          tag-pattern: "v*"
