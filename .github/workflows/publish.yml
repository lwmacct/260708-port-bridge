name: publish
run-name: publish ${{ inputs.source-tag }}

on:
  workflow_dispatch:
    inputs:
      source-tag:
        description: Release tag to publish.
        required: true
        type: string
      source-sha:
        description: Optional commit SHA that the release tag must point to.
        required: false
        type: string

concurrency:
  group: publish-${{ inputs.source-tag }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: marketplace
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.source-sha || inputs.source-tag }}
          fetch-depth: 0

      - name: Validate release ref
        uses: lwmacct/260707-action-verified-tag-ref@main
        with:
          tag: ${{ inputs.source-tag }}
          sha: ${{ inputs.source-sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Azure login
        if: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: "0"
        run: pnpm install --frozen-lockfile

      - name: Validate package versions
        env:
          SOURCE_TAG: ${{ inputs.source-tag }}
        run: scripts/verify-release-tag.sh

      - name: Typecheck
        run: pnpm run typecheck

      - name: Package extensions
        run: pnpm run package

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.source-tag }}
        run: scripts/publish-github-release.sh

      - name: Publish Visual Studio Marketplace
        if: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != '' }}
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        run: scripts/publish-marketplace.sh

      - name: Skip Visual Studio Marketplace publish
        if: ${{ vars.AZURE_CLIENT_ID == '' || vars.AZURE_TENANT_ID == '' || vars.AZURE_SUBSCRIPTION_ID == '' }}
        run: |
          {
            echo "### Marketplace"
            echo
            echo "Skipped Visual Studio Marketplace publish because Azure publishing variables are not configured."
          } >> "${GITHUB_STEP_SUMMARY}"
