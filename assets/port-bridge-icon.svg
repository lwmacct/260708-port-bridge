<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Port Bridge</title>
  <desc id="desc">An abstract infinity bridge connecting a local port to a remote port.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="10" x2="108" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="left" x1="22" y1="64" x2="66" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36D6A8"/>
      <stop offset="1" stop-color="#22B8B0"/>
    </linearGradient>
    <linearGradient id="right" x1="62" y1="64" x2="106" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#55B7FF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M28 64c11-21 31-21 45 0s34 21 47 0" stroke="#172235" stroke-width="26"/>
    <path d="M28 64c11-21 31-21 45 0" stroke="url(#left)" stroke-width="18"/>
    <path d="M55 64c14 21 34 21 47 0" stroke="url(#right)" stroke-width="18"/>
    <path d="M49 64h30" stroke="#F8FAFC" stroke-width="8"/>
  </g>
  <circle cx="31" cy="64" r="7" fill="#07111F"/>
  <circle cx="97" cy="64" r="7" fill="#07111F"/>
  <circle cx="31" cy="64" r="3" fill="#36D6A8"/>
  <circle cx="97" cy="64" r="3" fill="#55B7FF"/>
</svg>
